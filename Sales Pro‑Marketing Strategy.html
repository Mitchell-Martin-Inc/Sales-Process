<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro‑Marketing Strategy</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
.step-images a img {
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.step-images a img:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}
.step-images {
  display: flex;
  gap: 18px;
  margin-top: 18px;
  justify-content: center;
  flex-wrap: wrap;
}

.step-images img {
  height: 100px;
  object-fit: contain;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(circle at top, #13263c, #0b1624);
  color: #e9f1f7;
  min-height: 100vh;
  padding: 3rem 1.5rem;
}

h1 {
  text-align: center;
  font-size: 2.2rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
}

.subtitle {
  text-align: center;
  font-size: 0.95rem;
  color: #92a9bf;
  margin-bottom: 2.5rem;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 2.25rem;
}

.controls button {
  background: rgba(255,255,255,0.04);
  border: 1px solid #2e4a63;
  color: #b7cbe0;
  padding: 7px 18px;
  border-radius: 7px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.controls button:hover {
  background: rgba(122,184,245,0.1);
  border-color: #6ea5d8;
  color: #edf5fc;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
}

.step-card {
  background: linear-gradient(180deg, #172a41, #0f1f33);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 14px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.step-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.step-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px;
  cursor: pointer;
}

.step-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
  color: #0b1624;
  flex-shrink: 0;
}

.step-text {
  flex: 1;
}

.step-title {
  font-size: 15px;
  font-weight: 600;
}

.step-sub {
  font-size: 12px;
  color: #9db2c7;
  margin-top: 3px;
}

.chevron {
  font-size: 12px;
  color: #6f8aa5;
  transition: transform 0.25s;
}

.chevron.open {
  transform: rotate(180deg);
}

.step-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.step-body.open {
  max-height: 800px;
}

.step-content {
  padding: 0 22px 18px;
}

.list-item {
  font-size: 13px;
  color: #c3d4e6;
  padding: 8px 0;
  line-height: 1.55;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.list-item:last-child {
  border-bottom: none;
}

/* Color themes */
.c1 .step-icon { background: #7ab8f5; }
.c2 .step-icon { background: #6adbb5; }
.c3 .step-icon { background: #e6d36a; }
.c4 .step-icon { background: #f2b36d; }
.c5 .step-icon { background: #f18787; }
</style>
</head>

<body>

<h1>Sales Pro‑Marketing Strategy</h1>
<p class="subtitle">An interactive outbound methodology driving targeted, compliant outreach</p>

<div class="controls">
  <button onclick="toggleAll(true)">Expand all</button>
  <button onclick="toggleAll(false)">Collapse all</button>
</div>

<div class="container" id="container"></div>

<script>
const steps = [
{
  cls: "c1",
  icon: "1",
  title: "Identify the Market",
  sub: "Define where to focus",
  items: [
    "Identify companies actively hiring",
    "Review posted roles and assess fit",
    "Confirm industry, geography, and market signals"
  ],
  images: [
    "https://raw.githubusercontent.com/simonstorer-ux/Sales-Process/refs/heads/main/FC.png",
    "https://raw.githubusercontent.com/simonstorer-ux/Sales-Process/refs/heads/main/HC.png",
    "https://raw.githubusercontent.com/simonstorer-ux/Sales-Process/refs/heads/main/IT.png"
  ]
},
  {
    cls: "c2",
    icon: "2",
    title: "Identify Hiring Managers",
    sub: "Map buying roles",
    items: [
      "Decision Maker (Director / VP)",
      "Influencer (Manager / Lead)",
      "End User (Practitioner level)"
    ]
  },
  {
    cls: "c2",
    icon: "2A",
    title: "Submit List + Ownership Check",
    sub: "Ensure compliance and clarity",
    items: [
      "Submit list for approval",
      "Verify client ownership and contact rules",
      "Ensure full compliance before outreach"
    ]
  },
  {
    cls: "c3",
    icon: "3",
    title: "Identify Message Content",
    sub: "Align value to audience",
    items: [
      "Clarify the core value proposition",
      "Select strongest angle per persona",
      "Promote pro‑market candidates or redeployed talent"
    ]
  },
  {
    cls: "c4",
    icon: "4",
    title: "Execute Outreach",
    sub: "Multi-channel engagement",
    items: [
      "Email, call, LinkedIn, and text outreach",
      "Follow the Mitchell Martin cadence",
      "Use templates as guardrails, not scripts"
    ]
  },
  {
    cls: "c5",
    icon: "5",
    title: "Follow‑Up + Tracking",
    sub: "Measure and refine",
    items: [
      "Review results weekly",
      "Track replies and progress",
      "Log all outreach in Diva — if it’s not logged, it didn’t happen"
    ]
  }
];

function buildStep(step, i) {
  const id = `step-${i}`;

  const helpfulResourcesHtml = step.images
    ? `
      <div class="list-item">
        <div class="resources-title">Helpful resources</div>
        <div class="resources-description">
          Below are pre-built Copilot agents, which are client‑ready market intelligence reports
          for sales and advisory professionals serving Financial Services, Healthcare, and IT
          organizations. They independently monitor trusted sources to deliver concise, credible
          insights and industry developments, translating them into clear implications for Hiring
          Managers. Designed to strengthen sales conversations, executive briefings, and account
          planning with timely, decision‑relevant context and strategic insight.
        </div>
<div class="step-images">
  ${step.images.map((src, index) => {
    if (index === 0) {
      return `
        <a
          href="https://m365.cloud.microsoft/chat/?titleId=T_3bd64108-82bc-9db6-9361-f1b187caa82d&source=embedded-builder"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="${src}" alt="Financial Services Copilot agent" />
        </a>
      `;
    }

    if (index === 1) {
      return `
        <a
          href="https://m365.cloud.microsoft/chat/?titleId=T_ac19b564-5a9b-6e66-be39-87ad84d02d48&source=embedded-builder"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="${src}" alt="Healthcare Copilot agent" />
        </a>
      `;
    }

    if (index === 2) {
      return `
        <a
          href="https://m365.cloud.microsoft/chat/?titleId=T_2a2f1beb-4ac6-addd-3de4-cb01b8009b20&source=embedded-builder"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="${src}" alt="IT Copilot agent" />
        </a>
      `;
    }

    return `<img src="${src}" alt="Helpful resource" />`;
  }).join("")}
</div>

      </div>
    `
    : "";

  return `
  <div class="step-card ${step.cls}">
    <div class="step-header" onclick="toggle('${id}')">
      <div class="step-icon">${step.icon}</div>
      <div class="step-text">
        <div class="step-title">${step.title}</div>
        <div class="step-sub">${step.sub}</div>
      </div>
      <div class="chevron" id="chev-${id}">▼</div>
    </div>

    <div class="step-body" id="${id}">
      <div class="step-content">
        ${step.items.map(i => `<div class="list-item">${i}</div>`).join("")}
        ${helpfulResourcesHtml}
      </div>
    </div>
  </div>`;
}
``

document.getElementById("container").innerHTML =
  steps.map((s, i) => buildStep(s, i)).join("");

function toggle(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById(`chev-${id}`);
  const open = body.classList.contains("open");

  steps.forEach((_, i) => {
    document.getElementById(`step-${i}`).classList.remove("open");
    document.getElementById(`chev-step-${i}`).classList.remove("open");
  });

  body.classList.toggle("open", !open);
  chev.classList.toggle("open", !open);
}

function toggleAll(open) {
  steps.forEach((_, i) => {
    document.getElementById(`step-${i}`).classList.toggle("open", open);
    document.getElementById(`chev-step-${i}`).classList.toggle("open", open);
  });
}
</script>

</body>
</html>
