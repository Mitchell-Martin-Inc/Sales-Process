  <button onclick="toggleAll(true)">Expand all</button>

<script>
const steps=[
  {cls:"c1",icon:"1",title:"Identify your market",sub:"Define where to focus",items:["Identify companies actively hiring","Review posted roles and assess fit","Confirm industry, geography, and market signals"],
   images:[
    {src:"https://raw.githubusercontent.com/simonstorer-ux/Sales-Process/refs/heads/main/FC.png",alt:"Financial Services Copilot agent",href:"https://m365.cloud.microsoft/chat/?titleId=T_3bd64108-82bc-9db6-9361-f1b187caa82d&source=embedded-builder"},
    {src:"https://raw.githubusercontent.com/simonstorer-ux/Sales-Process/refs/heads/main/HC.png",alt:"Healthcare Copilot agent",href:"https://m365.cloud.microsoft/chat/?titleId=T_ac19b564-5a9b-6e66-be39-87ad84d02d48&source=embedded-builder"},
    {src:"https://raw.githubusercontent.com/simonstorer-ux/Sales-Process/refs/heads/main/IT.png",alt:"IT Copilot agent",href:"https://m365.cloud.microsoft/chat/?titleId=T_2a2f1beb-4ac6-addd-3de4-cb01b8009b20&source=embedded-builder"}
  ]},
  {cls:"c2",icon:"2",title:"Identify hiring managers",sub:"Map buying roles",items:["Decision Maker (Director / VP)","Influencer (Manager / Lead)","End User (Practitioner level)"]},
  {cls:"c2a",icon:"2A",title:"Submit list + ownership check",sub:"Ensure compliance and clarity",items:["Submit list for approval","Verify client ownership and contact rules","Ensure full compliance before outreach"]},
  {cls:"c3",icon:"3",title:"Identify message content",sub:"Align value to audience",items:["Clarify the core value proposition","Select strongest angle per persona","Promote pro‑market candidates or redeployed talent"]},
  {cls:"c4",icon:"4",title:"Execute outreach",sub:"Multi-channel engagement",items:["Email, call, LinkedIn, and text outreach","Follow the Mitchell Martin cadence","Use templates as guardrails, not scripts"],showProspect:true},
  {cls:"c5",icon:"5",title:"Follow‑up + tracking",sub:"Measure and refine",items:["Review results weekly","Track replies and progress","Log all outreach in Diva — if it's not logged, it didn't happen"]}
];

function buildStep(step,i){
  const id=`step-${i}`;
  const itemsHtml=step.items.map((item,j)=>{
    const isLast=j===step.items.length-1;
    const prospectBtn=(isLast&&step.showProspect)?`<div class="list-item">
  Use templates as guardrails, not scripts
</div>

<div class="cta-row">
  <button class="prospect-cta" onclick="openModal(event)">
    View 6-week prospecting process →
  </button>
</div>`:'';
    return `<div class="list-item">${item}${prospectBtn}</div>`;
  }).join('');

  const imagesHtml=step.images?`
    <div class="list-item">
      <div class="resources-title">Helpful resources</div>
      <div class="resources-description">Pre-built Copilot agents — client‑ready market intelligence reports for Financial Services, Healthcare, and IT. They monitor trusted sources to deliver concise insights for Hiring Managers, strengthening sales conversations and account planning.</div>
      <div class="step-images">${step.images.map(img=>`<a href="${img.href}" target="_blank" rel="noopener noreferrer"><img src="${img.src}" alt="${img.alt}"/></a>`).join('')}</div>
    </div>`:'';

  return `<div class="step-card ${step.cls}" id="card-${i}">
    <div class="step-header" onclick="toggle('${id}',${i})">
      <div class="step-icon">${step.icon}</div>
      <div class="step-text">
        <div class="step-title">${step.title}</div>
        <div class="step-sub">${step.sub}</div>
      </div>
      <div class="chevron" id="chev-${id}">▼</div>
    </div>
    <div class="step-body" id="${id}">
      <div class="step-content">${itemsHtml}${imagesHtml}</div>
    </div>
  </div>`;
}

document.getElementById('container').innerHTML=steps.map((s,i)=>buildStep(s,i)).join('');

function toggle(id,i){
  const body=document.getElementById(id);
  const chev=document.getElementById(`chev-${id}`);
  const card=document.getElementById(`card-${i}`);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
  card.classList.toggle('active',!open);
}

function toggleAll(open){
  steps.forEach((_,i)=>{
    document.getElementById(`step-${i}`).classList.toggle('open',open);
    document.getElementById(`chev-step-${i}`).classList.toggle('open',open);
    document.getElementById(`card-${i}`).classList.toggle('active',open);
  });
}

// Prospecting modal data
const W=[
  {n:"Week 1",l:"Initial reach out",s:"Make your first impression",days:[

    {d:"Wed — Day 3",t:"Follow-up phone call. If no answer, leave a short and friendly voicemail referencing your earlier email."},
    {d:"Fri — Day 5",t:"Send a LinkedIn connection request with a personalized note mentioning your email or voicemail to reinforce the relationship."}
  ]},
  {n:"Week 2",l:"Provide value",s:"Educate and engage",days:[
    {d:"Tue — Day 2",t:"Follow up your initial email with additional info or useful resources such as relevant articles or white papers aligned to their interests."},
    {d:"Wed — Day 3",t:"Social media engagement — like or comment on one of the prospect's recent posts if they're active on LinkedIn."},
    {d:"Thu — Day 4",t:"Short check-in call. If there's still no response, reference that you'll reach out again next week to stay top of mind."}
  ]},
  {n:"Week 3",l:"Building a connection",s:"Personalize & deepen the relationship",days:[
    {d:"Wed — Day 3",t:"Send a pro-market candidate profile and mention current market trends — positioning yourself as a trusted advisor."},
    {d:"Thu — Day 4",t:"Send a quick text or LinkedIn message referencing the pro-market candidate profile to reinforce the conversation."}
  ]},
  {n:"Week 4",l:"Personal engagement",s:"Warm outreach & live contact",days:[
    {d:"Mon — Day 1",t:"Send a friendly 'just checking in' email, inviting the prospect to share any questions about your services or the market."},
    {d:"Fri — Day 5",t:"Make a quick call and leave a voicemail that refers back to your previous messages and the pro-market candidate profile."}
  ]},
  {n:"Week 5",l:"Offer resources",s:"Demonstrate expertise",days:[
    {d:"Tue — Day 2",t:"Email reply to the pro-market candidate profile — add your commentary, insights, or a gentle nudge to gauge interest."},
    {d:"Thu — Day 4",t:"Follow-up call to see if they had a chance to review your email from Tuesday. Keep it brief and conversational."}
  ]},
  {n:"Week 6",l:"Final push / closing",s:"Wrap up or leave the door open",days:[
    {d:"Mon — Day 1",t:"Send a summary email articulating exactly how you can add specific value to their buyer persona and business."},
    {d:"Wed — Day 3",t:"Send a short LinkedIn message expressing that you'd love to connect whenever they're available — low pressure."},
    {d:"Fri — Day 5",t:"Final call. Leave a friendly voicemail reiterating your open-door policy and ask if they know anyone who could benefit from an introduction."}
  ]}
];
const WK_CLASS=["wk1","wk2","wk3","wk4","wk5","wk6"];
let snActive=0;

function buildSN(){
  document.getElementById('sn-nav').innerHTML=W.map((w,i)=>`
    <div class="sn-item ${WK_CLASS[i]}${i===snActive?' on':''}" onclick="snSel(${i})">
      <div class="sn-dot c${i+1}b">${i+1}</div>
      <div class="sn-txt">${w.l}<b>${w.n}</b></div>
    </div>`).join('');

  const w=W[snActive];
  document.getElementById('sn-panel').innerHTML=`
    <div class="sp-eyebrow c${snActive+1}t">${w.n}</div>
    <div class="sp-title">${w.l}</div>
    <div class="sp-sub">${w.s}</div>
    <div class="sp-hr"></div>
    ${w.days.map(d=>`<div class="sp-row"><div class="sp-day c${snActive+1}t">${d.d}</div><div class="sp-copy">${d.t}</div></div>`).join('')}`;
}

function snSel(i){
  snActive=i;
  buildSN();
}
const DAY_IDX={"Mon — Day 1":0,"Tue — Day 2":1,"Wed — Day 3":2,"Thu — Day 4":3,"Fri — Day 5":4};
const DAYS=["Mon","Tue","Wed","Thu","Fri"];

function buildKB(){
  document.getElementById('kb-wrap').innerHTML=W.map((w,i)=>`
    <div class="kb-col on" id="kb-${i}" onclick="kbTog(${i})">
      <div class="kb-head">
        <div class="kb-num c${i+1}b">${i+1}</div>
        <div class="kb-wk c${i+1}t">${w.n}</div>
        <div class="kb-title">${w.l}</div>
      </div>
      <div class="kb-body">
        ${w.days.map(d=>`<div class="kb-chip"><div class="kb-dtag c${i+1}t">${d.d}</div>${d.t}</div>`).join('')}
      </div>
    </div>`).join('');
}

function kbTog(i){
  document.getElementById('kb-'+i).classList.toggle('on');
}

function buildCal(){
  let h=`<div class="cal-corner"></div>${DAYS.map(d=>`<div class="cal-dh">${d}</div>`).join('')}`;
  W.forEach((w,wi)=>{
    const cells=Array(5).fill('');
    w.days.forEach(d=>{
      const di=DAY_IDX[d.d];
      if(di!==undefined){
        cells[di]+=`<div class="cal-ev c${wi+1}b"><div class="cal-ev-title">${w.l}</div><div class="cal-ev-copy">${d.t.substring(0,52)}…</div></div>`;
      }
    });
    h+=`<div class="cal-wl"><div class="cal-wnum c${wi+1}b">${wi+1}</div><div class="cal-wtxt">Wk ${wi+1}</div></div>`;
    cells.forEach(c=>{h+=`<div class="cal-cell">${c}</div>`;});
  });
  document.getElementById('cal-grid').innerHTML=h;
}

function show(id,btn){
  document.querySelectorAll('.layout').forEach(l=>l.classList.remove('on'));
  document.querySelectorAll('.ls-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('l-'+id).classList.add('on');
  btn.classList.add('on');
}
function openModal(e){
  e.stopPropagation();
  snActive=0;

  buildSN();
  buildKB();
  buildCal();

  show('sidenav', document.querySelector('.switcher .ls-btn'));

  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}
</script>
